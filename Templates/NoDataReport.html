<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; border: 1px solid #e0e0e0; padding: 30px; border-radius: 8px; background-color: #ffffff; }
        .header { border-bottom: 3px solid #6c757d; padding-bottom: 10px; margin-bottom: 20px; }
        .header h2 { color: #6c757d; margin: 0; }
        .info-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 20px; border-radius: 4px; margin: 20px 0; text-align: center; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body style="background-color: #f4f4f4;">
    <div class="container">
        <div class="header">
            <h2>Internal Report Service</h2>
        </div>
        <p>Hello,</p>
        <div class="info-box">
            <p style="margin: 0; font-size: 18px; color: #555;">
                <strong>No data found.</strong>
            </p>
            <p style="margin: 10px 0 0 0; color: #777;">There were no meters captured for the reporting period today.</p>
        </div>
        <p>Since no records were found, the automated Excel attachment has been omitted from this email.</p>
        <div class="footer">
            <p>This is an automated notification. Please do not reply to this email.</p>
        </div>
    </div>
</body>
</html>
